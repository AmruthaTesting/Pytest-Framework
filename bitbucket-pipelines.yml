image: python:3.11

definitions:
  caches:
    # Fix: custom cache must define the actual path
    pipenv-cache:
      key:
        files:
          - Pipfile.lock
      path: ~/.local/share/virtualenvs

  steps:

    # ── Smoke Tests ──────────────────────────────────────────────────────────
    # Runs on every Pull Request — fast check (T001, T002, T003 only)
    - step: &smoke
        name: "Smoke Tests"
        caches:
          - pip
          - pipenv-cache
        script:
          - pip install pipenv
          - pipenv install --ignore-pipfile
          - pipenv run playwright install --with-deps chromium
          - pipenv run pytest tests/Account.py
              -v -s
              -k "T001 or T002 or T003"
              --brows chromium
              --headless
              --url $QA_URL
              --alluredir=allure-results
        artifacts:
          - allure-results/**

    # ── Full Regression ───────────────────────────────────────────────────────
    # Runs on every push to QA branch — all 29 tests
    - step: &regression
        name: "Full Regression"
        caches:
          - pip
          - pipenv-cache
        script:
          - pip install pipenv
          - pipenv install --ignore-pipfile
          - pipenv run playwright install --with-deps chromium
          - pipenv run pytest tests
              -v -s
              --brows chromium
              --headless
              --url $QA_URL
              --alluredir=allure-results
              --reruns 1
              --reruns-delay 2
        artifacts:
          - allure-results/**

pipelines:

  # ── Runs automatically on every Pull Request ─────────────────────────────
  pull-requests:
    '**':
      - step: *smoke

  # ── Runs automatically on every push to QA branch ────────────────────────
  branches:
    QA:
      - step: *regression

  # ── Manual trigger from Bitbucket UI ─────────────────────────────────────
  custom:
    run-smoke:
      - step: *smoke

    run-full-regression:
      - step: *regression